name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Release check
        run: scripts/release_check.sh

      - name: Build executable
        run: uv run --extra release pyinstaller --onefile --name ctx --paths src src/ctx/__main__.py

      - name: Stage package
        run: |
          set -euo pipefail
          package=ctx-linux-x86_64
          rm -rf "$package" "$package.tar.gz"
          mkdir -p "$package/samples"
          cp dist/ctx "$package/ctx"
          cp README.md README_FIRST_zh.md "$package/"
          cp -R samples/ledger "$package/samples/ledger"
          if [ -f LICENSE ]; then cp LICENSE "$package/"; fi
          tar -czf "$package.tar.gz" "$package"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctx-linux-x86_64
          path: ctx-linux-x86_64.tar.gz

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ctx-linux-x86_64.tar.gz
